# Notes:
# - This file records the current conda/R environment skeleton used by the project.
# - Some packages were installed inside R rather than resolved cleanly by conda
#   on osx-arm64. After creating the environment, install/check them in R:
#     R -e 'BiocManager::install(c("edgeR", "ComplexHeatmap"), ask = FALSE)'
#     R -e 'install.packages("NMF")'
#     R -e 'remotes::install_github("sqjin/CellChat")'
#     R -e 'remotes::install_github("immunogenomics/presto")'
# - Exact package versions observed in the current environment are saved in
#   results/tables/package_versions_current.csv.
